<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HyperNova - Sci-Fi Battle Royale</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      overflow: hidden;
      font-family: 'Arial', sans-serif;
      background-color: #000;
      color: #fff;
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    
    #game-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      cursor: crosshair;
    }
    
    #game-container canvas {
      width: 100%;
      height: 100%;
    }
    
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      opacity: 0.8;
    }
    
    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background-color: rgba(255, 255, 255, 0.8);
    }
    
    #crosshair::before {
      width: 2px;
      height: 20px;
      left: 9px;
      top: 0;
    }
    
    #crosshair::after {
      width: 20px;
      height: 2px;
      left: 0;
      top: 9px;
    }
    
    #health-bar {
      position: absolute;
      bottom: 30px;
      left: 30px;
      width: 200px;
      height: 20px;
      background-color: rgba(0, 0, 0, 0.5);
      border: 2px solid rgba(255, 255, 255, 0.5);
    }
    
    #health-fill {
      width: 100%;
      height: 100%;
      background-color: #ff3e3e;
    }
    
    #ammo-counter {
      position: absolute;
      bottom: 30px;
      right: 30px;
      color: white;
      font-size: 24px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }
    
    #inventory {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }
    
    .inventory-slot {
      width: 60px;
      height: 60px;
      background-color: rgba(0, 0, 0, 0.5);
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 5px;
    }
    
    .inventory-slot.active {
      border-color: #3eff9e;
    }
    
    #mini-map-container {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 200px;
      height: 200px;
      background-color: rgba(0, 0, 0, 0.5);
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 5px;
      overflow: hidden;
    }
    
    #mini-map {
      width: 100%;
      height: 100%;
    }
    
    #player-indicator {
      position: absolute;
      width: 8px;
      height: 8px;
      background-color: #ff3e3e;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    
    #mini-map-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 3px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  
  <div id="hud">
    <div id="crosshair"></div>
    
    <div id="health-bar">
      <div id="health-fill"></div>
    </div>
    
    <div id="ammo-counter">30 / 120</div>
    
    <div id="inventory">
      <div class="inventory-slot active"></div>
      <div class="inventory-slot"></div>
      <div class="inventory-slot"></div>
    </div>
    
    <div id="mini-map-container">
      <canvas id="mini-map"></canvas>
      <div id="player-indicator"></div>
      <div id="mini-map-overlay"></div>
    </div>
  </div>
  
  <script type="module" src="/src/game/main.ts"></script>
</body>
</html>
